name: yapyap
options:
  bundleIdPrefix: cn.skyrin
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.30"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: arm64

targets:
  yapyap:
    type: application
    platform: macOS
    sources:
      - path: yapyap/Sources
      - path: yapyap/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cn.skyrin.yapyap
        INFOPLIST_FILE: yapyap/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: yapyap/Resources/yapyap.entitlements
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_NAME: yapyap
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: yapyap/Sources/SherpaOnnx-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Frameworks/sherpa-onnx.xcframework/macos-arm64_x86_64/Headers"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Frameworks"
        OTHER_LDFLAGS:
          - "-lc++"
          - "-lonnxruntime"
    dependencies:
      - framework: Frameworks/sherpa-onnx.xcframework
        embed: false
    entitlements:
      path: yapyap/Resources/yapyap.entitlements
